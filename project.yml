name: KajiKajiOkoku
options:
  bundleIdPrefix: com.amasaki
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.4"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"
targets:
  KajiKajiOkoku:
    type: application
    platform: iOS
    sources:
      - path: KajiKajiOkoku
    info:
      path: KajiKajiOkoku/Info.plist
      properties:
        CFBundleDisplayName: カジカジ王国
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "4"
        LSRequiresIPhoneOS: true
        UIDeviceFamily:
          - 1
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: 食べ物の写真を撮るためにカメラを使用します
        NSPhotoLibraryUsageDescription: 食べ物の写真を選ぶためにフォトライブラリを使用します
        NSUserTrackingUsageDescription: 広告の最適化のために使用します
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        GADApplicationIdentifier: ca-app-pub-9404799280370656~7783891369
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: GoogleMobileAds
